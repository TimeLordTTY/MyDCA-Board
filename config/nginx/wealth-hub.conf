# WealthHub 财富中枢系统 - Nginx 配置
# 
# 使用说明：
# 1. 将此文件复制到 nginx 配置目录（如 /etc/nginx/sites-available/）
# 2. 修改 server_name 为你的域名
# 3. 修改 root 和 alias 中的路径为实际部署路径
# 4. 确保后端服务运行在 127.0.0.1:8766
# 5. 重载 nginx 配置：nginx -s reload
#
# 路径规划：
# - 前端静态资源：/wealth-hub/
# - 后端 API：/wealth-hub/api/v2/...
#

server {
    listen 80;
    listen [::]:80;
    server_name www.timelordtty.cn;  # 修改为你的域名
    
    index index.html index.htm;
    root /www/wwwroot/wealth-hub/backend;  # 可选：默认根目录

    # ============================================================
    # 前端静态资源
    # 访问路径：http://域名/wealth-hub/
    # ============================================================
    location /wealth-hub {
        alias /www/wwwroot/wealth-hub/frontend/dist;  # 前端构建产物路径
        index index.html;
        try_files $uri $uri/ /wealth-hub/index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================================
    # 后端 API 代理
    # 访问路径：http://域名/wealth-hub/api/v2/...
    # 代理到：http://127.0.0.1:8766/api/v2/...
    # ============================================================
    location /wealth-hub/api/ {
        # 路径重写：/wealth-hub/api/xxx -> /api/xxx
        rewrite ^/wealth-hub/api(.*)$ /api$1 break;
        
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Host $host:$server_port;
        proxy_set_header X-Scheme $scheme;
        
        # 超时设置
        proxy_connect_timeout 30s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 30s;
        
        # WebSocket 支持（如需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 缓存标识
        add_header X-Cache $upstream_cache_status;
    }

    # ============================================================
    # 安全配置
    # ============================================================
    
    # 禁止访问敏感文件
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README\.md|package\.json|package-lock\.json|\.env) {
        return 404;
    }

    # SSL 证书验证目录
    location /.well-known/ {
        root /www/wwwroot/java_node_ssl;
    }

    # 禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # ============================================================
    # 日志配置
    # ============================================================
    access_log /www/wwwlogs/wealth-hub.log;
    error_log /www/wwwlogs/wealth-hub.error.log;
}
