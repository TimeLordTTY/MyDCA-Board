server
{
    listen 80;
    listen [::]:80;
    server_name www.timelordtty.cn;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/wealth-hub/backend;
    include /www/server/panel/vhost/nginx/extension/wealth-hub-1/*.conf;
    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/wealth-hub-1.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #SSL-END

    #REWRITE-START 伪静态相关配置
    include /www/server/panel/vhost/rewrite/java_wealth-hub-1.conf;
    #REWRITE-END

    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env) {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location /.well-known/ {
        root /www/wwwroot/java_node_ssl;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    #STATIC-START 静态资源相关配置
    #STATIC-END
    
    # PC端前端静态资源
    # 将 D:\Project\MyDCA-Board\web\dist 同步到 /www/wwwroot/wealth-hub/frontend/dist
    location /wealth-hub {
        alias /www/wwwroot/wealth-hub/frontend/dist/wealth-hub;
        index index.html;
        try_files $uri $uri/ /wealth-hub/index.html;
    }
    
    # Mobile端前端静态资源
    location /wealth-hub-mobile {
        alias /www/wwwroot/wealth-hub/frontend/dist/wealth-hub-mobile;
        index index.html;
        try_files $uri $uri/ /wealth-hub-mobile/index.html;
    }
    
    #PROXY-LOCAl-START 代理本地服务的相关配置
    # 统一 API 入口：/api/** -> 后端 http://127.0.0.1:8766/api/**
    location /api/ {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header REMOTE-HOST $remote_addr;
        add_header X-Cache $upstream_cache_status;
        proxy_set_header X-Host $host:$server_port;
        proxy_set_header X-Scheme $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    #PROXY-END/api/

    
    #PROXY-LOCAl-END

    access_log  /www/wwwlogs/wealth-hub-1.log;
    error_log  /www/wwwlogs/wealth-hub-1.error.log;
}
